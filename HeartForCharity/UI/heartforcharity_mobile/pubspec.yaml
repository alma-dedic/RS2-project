name: heartforcharity_mobile
description: "HeartForCharity mobile application for donors and volunteers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  heartforcharity_shared:
    path: ../heartforcharity_shared

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  webview_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
